<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <title>Lapis AI - Knowledge Chat</title>

    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/assistant-logo.png" />

    <style>
      :root {
        color-scheme: dark;
        background: #000;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        min-height: 100%;
        margin: 0;
        background: #000;
        color: #fff;
      }

      body {
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-shell { position: fixed; inset: 0; display: flex; overflow: hidden; background: #000; }
      .boot-rail { width: 76px; flex: 0 0 76px; border-right: 1px solid rgba(255,255,255,.04); display: flex; flex-direction: column; align-items: center; gap: 28px; padding-top: 27px; }
      .boot-rail img { width: 32px; height: 32px; object-fit: contain; }
      .boot-rail span { width: 34px; height: 34px; border-radius: 12px; background: rgba(255,255,255,.045); animation: bootPulse 1.25s ease-in-out infinite alternate; }
      .boot-main { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .boot-content { width: min(930px, 88vw); transform: translateY(-8px); }
      .boot-heading { width: min(620px, 72%); height: 48px; margin: 0 auto 32px; border-radius: 16px; background: rgba(255,255,255,.055); animation: bootPulse 1.25s ease-in-out infinite alternate; }
      .boot-input { position: relative; height: 190px; border-radius: 30px; border: 1px solid rgba(255,255,255,.09); background: #111216; box-shadow: 0 24px 90px rgba(0,0,0,.5); }
      .boot-input i { position: absolute; display: block; background: rgba(255,255,255,.065); animation: bootPulse 1.25s ease-in-out infinite alternate; }
      .boot-line { left: 28px; top: 28px; width: 208px; height: 20px; border-radius: 999px; }
      .boot-pill { bottom: 20px; height: 44px; border-radius: 999px; }
      .boot-pill-left { left: 20px; width: 128px; }
      .boot-pill-right { right: 20px; width: 96px; }
      .boot-cards { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 20px; margin-top: 40px; }
      .boot-cards i { display: block; height: 128px; border-radius: 24px; border: 1px solid rgba(255,255,255,.035); background: rgba(255,255,255,.045); animation: bootPulse 1.25s ease-in-out infinite alternate; }
      @keyframes bootPulse { from { opacity: .5; } to { opacity: 1; } }
      @media (max-width: 767px) { .boot-rail { width: 60px; flex-basis: 60px; } .boot-main { padding: 16px; } .boot-content { width: 100%; } .boot-heading { width: 78%; height: 38px; } .boot-input { height: 170px; border-radius: 24px; } .boot-cards { grid-template-columns: 1fr; } .boot-cards i:nth-child(n+2) { display: none; } }
    </style>

    <!-- Font dimuat setelah first paint dan tidak menahan React. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap"
      media="print"
      onload="this.media='all'"
    />

    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap"
      />
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap"
      />
    </noscript>
  </head>

  <body>
    <div id="root">
      <div class="boot-shell" aria-hidden="true">
        <div class="boot-rail">
          <img src="/icon.png" alt="" />
          <span></span>
          <span></span>
          <span></span>
        </div>
        <main class="boot-main">
          <div class="boot-content">
            <div class="boot-heading"></div>
            <div class="boot-input">
              <i class="boot-line"></i>
              <i class="boot-pill boot-pill-left"></i>
              <i class="boot-pill boot-pill-right"></i>
            </div>
            <div class="boot-cards">
              <i></i><i></i><i></i>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
